<!DOCTYPE html>
<html>
<head>
  <title>Quiz Competition 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: gold;
      border: none;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Quiz Competition 2026</h1>
    <p><b>Date:</b> 4th May 2026</p>
    <p><b>Venue:</b> KAHOOT APP</p>
    <p><b>Max Participants:</b> 80</p>

    <hr>

    <input placeholder="Full Name">
    <input placeholder="Email">
    <input placeholder="Phone">
    <input placeholder="School">

    <button>Register</button>
  </div>
</body>
</html>
